<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar Studio</title>
    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --light-color: #010409;
            --dark-color: #ffffff;
            --success-color: #28a745;
            --card-bg: #0d1117;
            --card-border: 1px solid #30363d;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--light-color);
            color: var(--dark-color);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-card {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 15px;
            padding: 40px;
            color: white;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(42, 92, 170, 0.4);
            position: relative;
            overflow: hidden;
        }

        .header-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .header-card h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header-card p {
            font-size: 1.2rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            border: var(--card-border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            border-color: var(--secondary-color);
        }

        .tool-icon {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            font-size: 3rem;
            border-bottom: 1px solid #30363d;
        }

        .tool-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .tool-content h3 {
            margin-bottom: 10px;
            color: var(--dark-color);
            font-size: 1.2rem;
        }

        .tool-content p {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 15px;
            flex-grow: 1;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            text-align: center;
        }

        .btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn-block {
            display: block;
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 20px 0;
            color: #8b949e;
            border-top: 1px solid #30363d;
            margin-top: 30px;
        }

        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-color);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 1;
        }

        .status-new {
            background-color: var(--success-color);
        }

        .status-hot {
            background-color: #ff3b30;
        }

        .status-recommended {
            background-color: #ff9500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            .header-card h1 {
                font-size: 2rem;
            }
        }

        /* Startup Animation Overlay */
        #startup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background-color: #010409;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #startup-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #startup-overlay .hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>
    <!-- Startup Animation -->
    <div id="startup-overlay">
        <iframe src="动画.html" id="anim-frame"></iframe>
        <div class="hint">点击任意键进入 / Click anywhere to enter</div>
    </div>
    <div class="container">
        <div class="header-card">
            <h1>Oscar Studio</h1>
            <p>专注于提升教学和学习质量</p>
        </div>

        <main>
            <div class="tools-grid" id="tools-container">
                <div class="loading">正在加载工具...</div>
            </div>
        </main>

        <footer>
            <p>Oscar Studio &copy; 2025 - Designed by Oscar</p>
        </footer>
    </div>

    <script>
        // 从同文件夹下的config.json文件读取数据
        document.addEventListener('DOMContentLoaded', function () {
            fetch('config.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应不正常');
                    }
                    return response.json();
                })
                .then(data => {
                    displayTools(data.tools);
                })
                .catch(error => {
                    console.error('获取工具数据时出错:', error);
                    document.getElementById('tools-container').innerHTML =
                        '<div class="error">加载工具数据失败，请检查网络连接或配置文件。</div>';
                });
        });

        function displayTools(tools) {
            const container = document.getElementById('tools-container');

            if (!tools || tools.length === 0) {
                container.innerHTML = '<div class="error">没有找到工具数据。</div>';
                return;
            }

            let toolsHTML = '';

            tools.forEach(tool => {
                let statusHTML = '';
                if (tool.status && tool.status !== '无') {
                    // 将状态标签改为中文显示
                    let statusClass = 'featured-badge';
                    if (tool.status === '新') statusClass += ' status-new';
                    else if (tool.status === '热') statusClass += ' status-hot';
                    else if (tool.status === '推荐') statusClass += ' status-recommended';

                    statusHTML = `<span class="${statusClass}">${tool.status}</span>`;
                }

                toolsHTML += `
                    <div class="tool-card">
                        ${statusHTML}
                        <div class="tool-icon">
                            ${tool.icon || '🚀'}
                        </div>
                        <div class="tool-content">
                            <h3>${tool.name}</h3>
                            <p>${tool.description}</p>
                            <a href="${tool.domain}" target="_blank" class="btn btn-block">进入工具</a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = toolsHTML;
        }
    </script>
    <script>
        // Startup Animation Logic
        document.addEventListener('DOMContentLoaded', function () {
            const overlay = document.getElementById('startup-overlay');

            function closeOverlay() {
                if (!overlay) return;
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.remove();
                }, 500);
                window.removeEventListener('click', closeOverlay);
                window.removeEventListener('keydown', closeOverlay);
                window.removeEventListener('message', handleMessage);
            }

            function handleMessage(event) {
                if (event.data === 'close-intro') {
                    closeOverlay();
                }
            }

            window.addEventListener('click', closeOverlay);
            window.addEventListener('touchstart', closeOverlay);
            window.addEventListener('keydown', closeOverlay);
            window.addEventListener('message', handleMessage);
            window.focus();
        });
    </script>
</body>

</html>
