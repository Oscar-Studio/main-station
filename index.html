    <style>
        :root {
            /* Festive New Year Theme */
            --primary-color: #D32F2F;
            /* Festive Red */
            --secondary-color: #FFD700;
            /* Gold */
            --accent-color: #FF5252;
            --light-color: #010409;
            --dark-color: #ffffff;
            --success-color: #28a745;
            --card-bg: #1a0f0f;
            /* Slightly reddish dark background */
            --card-border: 1px solid #4a1a1a;
            --card-shadow: 0 10px 20px rgba(211, 47, 47, 0.2);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--light-color);
            color: var(--dark-color);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-card {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 15px;
            padding: 40px;
            color: white;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(211, 47, 47, 0.4);
            position: relative;
            overflow: hidden;
        }

        .header-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .header-card h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header-card p {
            font-size: 1.2rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* Main Layout Styles */
        .main-layout {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }

        .tools-section {
            flex: 1;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Sidebar Cards */
        .sidebar-card {
            background: var(--card-bg);
            border: var(--card-border);
            border-radius: 10px;
            padding: 20px;
            box-shadow: var(--card-shadow);
            color: var(--dark-color);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .sidebar-card:hover {
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            border-color: var(--secondary-color);
        }

        .sidebar-card h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: white;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }

        /* Announcement Card */
        .announcement-list {
            list-style: none;
        }

        .announcement-item {
            border-bottom: 1px solid #30363d;
            padding: 12px 0;
            font-size: 0.95rem;
            color: #d0d7de;
            line-height: 1.5;
            transition: var(--transition);
        }

        .announcement-item:last-child {
            border-bottom: none;
        }

        .announcement-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .announcement-date {
            display: block;
            font-size: 0.8rem;
            color: var(--secondary-color);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .announcement-content {
            opacity: 0.9;
        }

        .toggle-announcement {
            margin-top: 15px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #30363d;
            padding: 10px;
            border-radius: 5px;
            transition: var(--transition);
        }

        .toggle-announcement:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* Clock Card */
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
        }

        .analog-clock {
            width: 150px;
            height: 150px;
            border: 4px solid var(--secondary-color);
            border-radius: 50%;
            margin-bottom: 20px;
            position: relative;
            background: radial-gradient(circle, #1a2332 0%, #0d1117 100%);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
            z-index: 2;
            transform: translateX(-50%) rotate(0deg);
        }

        .hour-hand {
            width: 4px;
            height: 35px;
            background: white;
            z-index: 3;
        }

        .minute-hand {
            width: 3px;
            height: 50px;
            background: #8b949e;
            z-index: 3;
        }

        .second-hand {
            width: 2px;
            height: 60px;
            background: #ff3b30;
            z-index: 4;
        }

        .center-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            border: 2px solid var(--secondary-color);
        }

        .marker {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            width: 2px;
            height: 10px;
            left: 50%;
            top: 5px;
            transform-origin: 50% 70px;
            /* (Clock height / 2) - top offset = 75 - 5 = 70px */
        }

        /* Using transform-origin to rotate the markers around the center of the clock */
        /* Center of clock is at 75px, 75px. 
           Marker top is at 5px. Height is 10px. 
           Distance from marker top to center is 70px.
           So transform-origin Y should be 70px? 
           Wait, 'top: 5px' means top edge is 5px from parent top.
           Center is at 75px from parent top.
           Distance is 75 - 5 = 70px.
        */

        .digital-time {
            font-size: 2.2rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: white;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            margin-bottom: 5px;
        }

        .current-date {
            color: #8b949e;
            font-size: 1rem;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            border: var(--card-border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            border-color: var(--secondary-color);
        }

        .tool-icon {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            font-size: 3rem;
            border-bottom: 1px solid #30363d;
        }

        .tool-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .tool-content h3 {
            margin-bottom: 10px;
            color: var(--dark-color);
            font-size: 1.2rem;
        }

        .tool-content p {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 15px;
            flex-grow: 1;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            text-align: center;
        }

        .btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn-block {
            display: block;
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 20px 0;
            color: #8b949e;
            border-top: 1px solid #30363d;
            margin-top: 30px;
        }

        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-color);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 1;
        }

        .status-new {
            background-color: var(--success-color);
        }

        .status-hot {
            background-color: #ff3b30;
        }

        .status-recommended {
            background-color: #ff9500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .header-card h1 {
                font-size: 2rem;
            }
        }

        /* Startup Animation Overlay */
        #startup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background-color: #010409;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #startup-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #startup-overlay .hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 0.3;
            }
        }

        /* 用户登录相关样式 - 添加在现有CSS末尾 */
        .user-section {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            text-decoration: none;
        }

        .user-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid var(--secondary-color);
        }

        .user-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--card-bg);
            border: var(--card-border);
            border-radius: 10px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: none;
            overflow: hidden;
        }

        .user-dropdown.active {
            display: block;
        }

        .user-info {
            padding: 15px;
            border-bottom: 1px solid #30363d;
        }

        .user-info .username {
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }

        .user-info .phone {
            color: #8b949e;
            font-size: 0.85rem;
        }

        .dropdown-menu {
            list-style: none;
        }

        .dropdown-menu li {
            border-bottom: 1px solid #30363d;
        }

        .dropdown-menu li:last-child {
            border-bottom: none;
        }

        .dropdown-menu a {
            display: block;
            padding: 12px 15px;
            color: #d0d7de;
            text-decoration: none;
            transition: var(--transition);
        }

        .dropdown-menu a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            display: none;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: var(--card-border);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: white;
            margin: 0;
        }

        .close-modal {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition);
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d0d7de;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #30363d;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .form-group .error {
            color: #ff3b30;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #30363d;
            text-align: right;
        }

        #apiMessage {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        #apiMessage.success {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        #apiMessage.error {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }

        @media (max-width: 768px) {
            .user-section {
                position: relative;
                top: 0;
                right: 0;
                justify-content: flex-end;
                margin-bottom: 15px;
            }

            .user-dropdown {
                right: 50%;
                transform: translateX(50%);
            }
        }
    </style>
</head>

<body>
    <!-- Startup Animation -->
    <div id="startup-overlay">
        <iframe src="Firework_Simulator/index.html" id="anim-frame"></iframe>
        <div id="startup-close-btn"
            style="position:absolute; top:70px; right:20px; color:white; font-size:30px; cursor:pointer; z-index:10001; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.1); border-radius:50%;">
            ×</div>
    </div>

    <!-- 在 <body> 开始处，<header-card> 之前添加 -->
    <div class="user-section" id="userSection">
        <!-- 未登录时显示 -->
        <button class="user-btn" id="loginBtn">登录</button>
        <button class="user-btn" id="registerBtn">注册</button>

        <!-- 登录后显示 -->
        <div id="loggedInUser" style="display: none;">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-info">
                    <div class="username" id="dropdownUsername"></div>
                    <div class="phone" id="dropdownPhone"></div>
                </div>
                <ul class="dropdown-menu">
                    <li><a href="#" id="editProfileBtn">修改个人信息</a></li>
                    <li><a href="#" id="changePasswordBtn">修改密码</a></li>
                    <li><a href="#" id="logoutBtn">退出登录</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">登录</h3>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="apiMessage"></div>

                <!-- 登录表单 -->
                <form id="loginForm" style="display: none;">
                    <div class="form-group">
                        <label for="loginAccount">用户名/手机号</label>
                        <input type="text" id="loginAccount" placeholder="请输入用户名或手机号">
                        <div class="error" id="loginAccountError"></div>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码">
                        <div class="error" id="loginPasswordError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn" style="width: 100%;">登录</button>
                    </div>
                </form>

                <!-- 注册表单 -->
                <form id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label for="regUsername">用户名</label>
                        <input type="text" id="regUsername" placeholder="请输入用户名（3-50字符）">
                        <div class="error" id="regUsernameError"></div>
                    </div>
                    <div class="form-group">
                        <label for="regPhone">手机号</label>
                        <input type="text" id="regPhone" placeholder="请输入11位手机号">
                        <div class="error" id="regPhoneError"></div>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">密码</label>
                        <input type="password" id="regPassword" placeholder="请输入密码（至少6位）">
                        <div class="error" id="regPasswordError"></div>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">确认密码</label>
                        <input type="password" id="regConfirmPassword" placeholder="请再次输入密码">
                        <div class="error" id="regConfirmPasswordError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn" style="width: 100%;">注册</button>
                    </div>
                </form>

                <!-- 修改个人信息表单 -->
                <form id="editProfileForm" style="display: none;">
                    <div class="form-group">
                        <label for="editUsername">用户名</label>
                        <input type="text" id="editUsername" placeholder="请输入新用户名">
                        <div class="error" id="editUsernameError"></div>
                    </div>
                    <div class="form-group">
                        <label for="editPhone">手机号</label>
                        <input type="text" id="editPhone" placeholder="请输入新手机号">
                        <div class="error" id="editPhoneError"></div>
                    </div>
                    <div class="form-group">
                        <label for="editPassword">当前密码（用于验证）</label>
                        <input type="password" id="editPassword" placeholder="请输入当前密码">
                        <div class="error" id="editPasswordError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn" style="width: 100%;">保存修改</button>
                    </div>
                </form>

                <!-- 修改密码表单 -->
                <form id="changePasswordForm" style="display: none;">
                    <div class="form-group">
                        <label for="currentPassword">当前密码</label>
                        <input type="password" id="currentPassword" placeholder="请输入当前密码">
                        <div class="error" id="currentPasswordError"></div>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <input type="password" id="newPassword" placeholder="请输入新密码（至少6位）">
                        <div class="error" id="newPasswordError"></div>
                    </div>
                    <div class="form-group">
                        <label for="confirmNewPassword">确认新密码</label>
                        <input type="password" id="confirmNewPassword" placeholder="请再次输入新密码">
                        <div class="error" id="confirmNewPasswordError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn" style="width: 100%;">修改密码</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header-card" id="header-card" title="双击打开烟花秀">
            <h1>Oscar Studio</h1>
            <p>专注于提升教学和学习质量</p>
        </div>

        <main>
            <div class="main-layout">
                <!-- Main Tools Section -->
                <div class="tools-section">
                    <div class="tools-grid" id="tools-container">
                        <div class="loading">正在加载工具...</div>
                    </div>
                </div>

                <!-- Right Sidebar -->
                <aside class="sidebar">
                    <!-- Announcement Card -->
                    <div class="sidebar-card announcement-card">
                        <h3>最新公告</h3>
                        <ul class="announcement-list" id="announcement-list">
                            <li style="text-align:center; padding:10px; color:#888;">加载公告中...</li>
                        </ul>
                        <button class="toggle-announcement" id="toggle-announcements">展开更多 ▼</button>
                    </div>

                    <!-- Clock Card -->
                    <div class="sidebar-card clock-card">
                        <h3>当前时间</h3>
                        <div class="clock-container">
                            <div class="analog-clock">
                                <!-- 12 Markers -->
                                <div class="clock-face-markers" id="clock-markers">
                                    <div class="marker" style="transform: translateX(-50%) rotate(0deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(30deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(60deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(90deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(120deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(150deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(180deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(210deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(240deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(270deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(300deg)"></div>
                                    <div class="marker" style="transform: translateX(-50%) rotate(330deg)"></div>
                                </div>
                                <div class="hand hour-hand" id="hour-hand"></div>
                                <div class="hand minute-hand" id="minute-hand"></div>
                                <div class="hand second-hand" id="second-hand"></div>
                                <div class="center-dot"></div>
                            </div>
                            <div class="digital-time" id="digital-time">--:--:--</div>
                            <div class="current-date" id="current-date">----/--/--</div>
                        </div>
                    </div>
                </aside>
            </div>
        </main>

        <footer>
            <p>Oscar Studio &copy; 2026 - Designed by Oscar</p>
            <p><a href="https://beian.miit.gov.cn/" target="_blank">粤ICP备2026012488号-1</a></p>
        </footer>
    </div>

    <script>
        // Main Application Logic
        document.addEventListener('DOMContentLoaded', function () {
            // 1. Load Tools
            fetch('config.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应不正常');
                    }
                    return response.json();
                })
                .then(data => {
                    displayTools(data.tools);
                })
                .catch(error => {
                    console.error('获取工具数据时出错:', error);
                    document.getElementById('tools-container').innerHTML =
                        '<div class="error">加载工具数据失败，请检查网络连接或配置文件。</div>';
                });

            // 2. Load Announcements
            fetchAnnouncements();

            // 3. Start Clock
            startClock();

            // 4. Startup Overlay Logic
            setupStartupOverlay();

            // 5. 初始化用户管理
            checkLoginStatus();
            setupEventListeners();
        });

        // --- Tools Logic ---
        function displayTools(tools) {
            const container = document.getElementById('tools-container');

            if (!tools || tools.length === 0) {
                container.innerHTML = '<div class="error">没有找到工具数据。</div>';
                return;
            }

            let toolsHTML = '';

            tools.forEach(tool => {
                let statusHTML = '';
                if (tool.status && tool.status !== '无') {
                    let statusClass = 'featured-badge';
                    if (tool.status === '新') statusClass += ' status-new';
                    else if (tool.status === '热') statusClass += ' status-hot';
                    else if (tool.status === '推荐') statusClass += ' status-recommended';

                    statusHTML = `<span class="${statusClass}">${tool.status}</span>`;
                }

                toolsHTML += `
                <div class="tool-card">
                    ${statusHTML}
                    <div class="tool-icon">
                        ${tool.icon || '🚀'}
                    </div>
                    <div class="tool-content">
                        <h3>${tool.name}</h3>
                        <p>${tool.description}</p>
                        <a href="${tool.domain}" target="_blank" class="btn btn-block">进入工具</a>
                    </div>
                </div>
            `;
            });

            container.innerHTML = toolsHTML;
        }

        // --- Announcement Logic ---
        let allAnnouncements = [];
        let isExpanded = false;

        function fetchAnnouncements() {
            fetch('announcement.json')
                .then(res => res.json())
                .then(data => {
                    // Show n, n-1, n-2 (latest 3)
                    // We reverse the array so index 0 is the last element of the original JSON
                    allAnnouncements = data.reverse();

                    renderAnnouncements();

                    const btn = document.getElementById('toggle-announcements');
                    if (data.length <= 3) {
                        btn.style.display = 'none';
                    } else {
                        btn.style.display = 'block';
                        btn.onclick = () => {
                            isExpanded = !isExpanded;
                            renderAnnouncements();
                            btn.innerHTML = isExpanded ? '收起公告 ▲' : '展开更多 ▼';
                        };
                    }
                })
                .catch(err => {
                    console.error('Failed to load announcements:', err);
                    document.getElementById('announcement-list').innerHTML = '<li class="announcement-item" style="color:#d32f2f;">加载失败</li>';
                    document.getElementById('toggle-announcements').style.display = 'none';
                });
        }

        function renderAnnouncements() {
            const list = document.getElementById('announcement-list');
            const itemsToShow = isExpanded ? allAnnouncements : allAnnouncements.slice(0, 3);

            if (itemsToShow.length === 0) {
                list.innerHTML = '<li class="announcement-item">暂无公告</li>';
                return;
            }

            let html = '';
            itemsToShow.forEach(item => {
                html += `
                <li class="announcement-item">
                    <span class="announcement-date">${item.date}</span>
                    <div class="announcement-content">${item.content}</div>
                </li>
            `;
            });
            list.innerHTML = html;
        }

        // --- Clock Logic ---
        function startClock() {
            const updateTime = () => {
                const now = new Date();

                // Digital
                const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
                document.getElementById('digital-time').textContent = timeStr;

                const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                document.getElementById('current-date').textContent = dateStr;

                // Analog
                const seconds = now.getSeconds();
                const minutes = now.getMinutes();
                const hours = now.getHours();

                const secondDeg = ((seconds / 60) * 360);
                const minuteDeg = ((minutes / 60) * 360) + ((seconds / 60) * 6);
                const hourDeg = ((hours % 12 / 12) * 360) + ((minutes / 60) * 30);

                const secondHand = document.getElementById('second-hand');
                const minuteHand = document.getElementById('minute-hand');
                const hourHand = document.getElementById('hour-hand');

                if (secondHand) secondHand.style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
                if (minuteHand) minuteHand.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
                if (hourHand) hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            };

            updateTime();
            setInterval(updateTime, 1000);
        }

        // --- Startup Overlay Logic ---
        function setupStartupOverlay() {
            const overlay = document.getElementById('startup-overlay');
            const closeBtn = document.getElementById('startup-close-btn');

            function closeOverlay() {
                if (!overlay) return;
                overlay.style.opacity = '0';
                setTimeout(() => {
                    if (overlay.parentNode) overlay.remove();
                }, 500);
            }

            if (closeBtn) closeBtn.onclick = closeOverlay;
            window.focus();
        }

        // --- New Year & Firework Show Logic ---
        function setupNewYearLogic() {
            const headerCard = document.getElementById('header-card');

            // 1. Double click to open fireworks
            headerCard.addEventListener('dblclick', () => {
                openFireworkShow();
            });

            // 2. Scheduled logic
            setInterval(() => {
                const now = new Date();
                const month = now.getMonth() + 1;
                const day = now.getDate();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                // Check for 2026/12/31 23:59:00
                if (now.getFullYear() === 2026 && month === 12 && day === 31 && hours === 23 && minutes === 59 && seconds === 0) {
                    if (!document.getElementById('firework-overlay')) {
                        openFireworkShow(true); // true means automatic mode
                    }
                }

                // Coordination with the firework show
                const fireworkIframe = document.getElementById('firework-iframe');
                if (fireworkIframe && fireworkIframe.contentWindow) {
                    // Start countdown at 23:59:50
                    if (hours === 23 && minutes === 59 && seconds === 50) {
                        fireworkIframe.contentWindow.postMessage('start-countdown', '*');
                    }
                    // Start finale at 00:00:00
                    if (hours === 0 && minutes === 0 && seconds === 0) {
                        fireworkIframe.contentWindow.postMessage('start-finale', '*');
                    }
                    // Close at 00:01:00
                    if (hours === 0 && minutes === 1 && seconds === 0) {
                        closeFireworkShow();
                    }
                }
            }, 1000);
        }

        function openFireworkShow(isAuto = false) {
            if (document.getElementById('firework-overlay')) return;

            const overlay = document.createElement('div');
            overlay.id = 'firework-overlay';
            overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; background:#000; transition:opacity 0.5s ease;';

            const iframe = document.createElement('iframe');
            iframe.id = 'firework-iframe';
            iframe.src = 'Firework_Simulator/index.html';
            iframe.style.cssText = 'width:100%; height:100%; border:none;';

            const closeBtn = document.createElement('div');
            closeBtn.innerHTML = '×';
            closeBtn.style.cssText = 'position:absolute; top:70px; right:20px; color:white; font-size:30px; cursor:pointer; z-index:10001; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.1); border-radius:50%;';
            closeBtn.onclick = closeFireworkShow;

            overlay.appendChild(iframe);
            overlay.appendChild(closeBtn);
            document.body.appendChild(overlay);
        }

        function closeFireworkShow() {
            const overlay = document.getElementById('firework-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            }
        }

        // Initialize New Year logic
        setupNewYearLogic();

        // ================= 用户登录管理 =================

        // API基础URL - 根据您的服务器IP修改
        // 注意：如果遇到跨域问题，可以尝试以下几种方式：
        // 1. 使用相对路径（如果API在同一域名下）
        // 2. 在服务器端配置CORS
        // 3. 使用代理
        const API_BASE_URL = 'https://119.23.64.153/api';

        // 跨域Cookie域名配置
        const COOKIE_DOMAIN = '.oscarstudio.cn';

        // 测试API是否可访问
        console.log('API Base URL:', API_BASE_URL);

        // 用户状态管理
        let currentUser = null;
        let currentToken = null;

        // ================= Cookie 辅助函数 =================

        // 读取 Cookie
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        // 写入 Cookie（跨域）
        function setCookie(name, value, days = 7) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; domain=${COOKIE_DOMAIN}; samesite=Lax`;
        }

        // 清除 Cookie
        function deleteCookie(name) {
            document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=${COOKIE_DOMAIN}`;
        }

        // DOM元素
        const userSection = document.getElementById('userSection');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const loggedInUser = document.getElementById('loggedInUser');
        const userAvatar = document.getElementById('userAvatar');
        const userDropdown = document.getElementById('userDropdown');
        const dropdownUsername = document.getElementById('dropdownUsername');
        const dropdownPhone = document.getElementById('dropdownPhone');
        const editProfileBtn = document.getElementById('editProfileBtn');
        const changePasswordBtn = document.getElementById('changePasswordBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        // 模态框元素
        const modalOverlay = document.getElementById('modalOverlay');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const closeModal = document.getElementById('closeModal');
        const apiMessage = document.getElementById('apiMessage');

        // 表单元素
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const editProfileForm = document.getElementById('editProfileForm');
        const changePasswordForm = document.getElementById('changePasswordForm');

        // 检查登录状态（Cookie 优先，localStorage 兜底）
        function checkLoginStatus() {
            // 1. 优先从 Cookie 获取（可跨子域名）
            let token = getCookie('userToken');
            let userData = null;

            if (token) {
                // Cookie 有 token，尝试从 localStorage 获取用户数据
                const storedUserData = localStorage.getItem('userData');
                if (storedUserData) {
                    try {
                        userData = JSON.parse(storedUserData);
                    } catch (e) {
                        console.error('解析用户数据失败:', e);
                    }
                }
                console.log('从 Cookie 获取登录状态:', { token: token.substring(0, 20) + '...', userData });
            } else {
                // 2. Cookie 没有，fallback 到 localStorage（仅对本域名有效）
                token = localStorage.getItem('userToken');
                const storedUserData = localStorage.getItem('userData');
                if (storedUserData) {
                    try {
                        userData = JSON.parse(storedUserData);
                    } catch (e) {
                        console.error('解析用户数据失败:', e);
                    }
                }
                console.log('从 localStorage 获取登录状态:', { token: token ? token.substring(0, 20) + '...' : null, userData });
            }

            if (token && userData) {
                currentToken = token;
                currentUser = userData;
                updateUserUI();
            }
        }

        // 测试API连接 - 修改后的版本
        async function testAPIConnection() {
            try {
                console.log('测试API连接...');

                // 使用OPTIONS方法而不是GET来测试
                const response = await fetch(`${API_BASE_URL}/login.php`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'content-type'
                    }
                });

                console.log('API连接测试响应:', response.status, response.statusText);

                // 检查CORS头部
                const corsHeaders = {
                    'allow-origin': response.headers.get('access-control-allow-origin'),
                    'allow-methods': response.headers.get('access-control-allow-methods'),
                    'allow-headers': response.headers.get('access-control-allow-headers')
                };
                console.log('CORS头部:', corsHeaders);

                // 即使返回405也认为是可访问的（因为API存在）
                return response.status === 200 || response.status === 204 || response.status === 405;
            } catch (error) {
                console.error('API连接测试失败:', error);
                return false;
            }
        }

        // 更新用户界面
        function updateUserUI() {
            console.log('更新用户界面:', currentUser);

            if (currentUser) {
                // 显示已登录状态
                loginBtn.style.display = 'none';
                registerBtn.style.display = 'none';
                loggedInUser.style.display = 'flex';

                // 更新用户信息
                const firstChar = currentUser.username ? currentUser.username.charAt(0).toUpperCase() : 'U';
                userAvatar.textContent = firstChar;
                dropdownUsername.textContent = currentUser.username || '未设置';
                dropdownPhone.textContent = currentUser.phone || '未设置';
            } else {
                // 显示未登录状态
                loginBtn.style.display = 'inline-block';
                registerBtn.style.display = 'inline-block';
                loggedInUser.style.display = 'none';
            }
        }

        // 设置事件监听器
        function setupEventListeners() {
            console.log('设置事件监听器');

            // 登录按钮
            loginBtn.addEventListener('click', () => {
                showModal('login');
            });

            // 注册按钮
            registerBtn.addEventListener('click', () => {
                showModal('register');
            });

            // 用户头像点击 - 显示/隐藏下拉菜单
            if (userAvatar) {
                userAvatar.addEventListener('click', (e) => {
                    e.stopPropagation();
                    userDropdown.classList.toggle('active');
                });
            }

            // 编辑个人信息
            if (editProfileBtn) {
                editProfileBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    userDropdown.classList.remove('active');
                    showModal('editProfile');
                });
            }

            // 修改密码
            if (changePasswordBtn) {
                changePasswordBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    userDropdown.classList.remove('active');
                    showModal('changePassword');
                });
            }

            // 退出登录
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    logout();
                });
            }

            // 关闭模态框
            if (closeModal) {
                closeModal.addEventListener('click', hideModal);
            }

            if (modalOverlay) {
                modalOverlay.addEventListener('click', (e) => {
                    if (e.target === modalOverlay) hideModal();
                });
            }

            // 表单提交事件
            if (loginForm) loginForm.addEventListener('submit', handleLogin);
            if (registerForm) registerForm.addEventListener('submit', handleRegister);
            if (editProfileForm) editProfileForm.addEventListener('submit', handleEditProfile);
            if (changePasswordForm) changePasswordForm.addEventListener('submit', handleChangePassword);

            // 点击页面其他地方关闭下拉菜单
            document.addEventListener('click', () => {
                if (userDropdown) userDropdown.classList.remove('active');
            });
        }

        // 显示模态框
        function showModal(type) {
            console.log('显示模态框:', type);

            // 隐藏所有表单
            if (loginForm) loginForm.style.display = 'none';
            if (registerForm) registerForm.style.display = 'none';
            if (editProfileForm) editProfileForm.style.display = 'none';
            if (changePasswordForm) changePasswordForm.style.display = 'none';
            clearMessages();

            switch (type) {
                case 'login':
                    modalTitle.textContent = '登录';
                    if (loginForm) loginForm.style.display = 'block';
                    break;
                case 'register':
                    modalTitle.textContent = '注册';
                    if (registerForm) registerForm.style.display = 'block';
                    break;
                case 'editProfile':
                    if (!currentUser) {
                        showMessage('请先登录');
                        return;
                    }
                    modalTitle.textContent = '修改个人信息';
                    document.getElementById('editUsername').value = currentUser.username || '';
                    document.getElementById('editPhone').value = currentUser.phone || '';
                    if (editProfileForm) editProfileForm.style.display = 'block';
                    break;
                case 'changePassword':
                    modalTitle.textContent = '修改密码';
                    if (changePasswordForm) changePasswordForm.style.display = 'block';
                    break;
            }

            if (modalOverlay) modalOverlay.classList.add('active');
        }

        // 隐藏模态框
        function hideModal() {
            console.log('隐藏模态框');
            if (modalOverlay) modalOverlay.classList.remove('active');
            clearMessages();
            clearFormErrors();
        }

        // 显示API消息
        function showMessage(message, type = 'error') {
            console.log('显示消息:', type, message);
            if (apiMessage) {
                apiMessage.textContent = message;
                apiMessage.className = type;
                apiMessage.style.display = 'block';
            }
        }

        // 清除消息
        function clearMessages() {
            if (apiMessage) {
                apiMessage.textContent = '';
                apiMessage.style.display = 'none';
            }
        }

        // 清除表单错误
        function clearFormErrors() {
            const errors = document.querySelectorAll('.error');
            errors.forEach(error => {
                error.textContent = '';
                error.style.display = 'none';
            });
        }

        // 显示表单错误
        function showFormError(fieldId, message) {
            const errorElement = document.getElementById(fieldId + 'Error');
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
        }

        // ================= API 调用函数 =================

        // 处理登录 - 修正后的版本
        async function handleLogin(e) {
            e.preventDefault();
            clearMessages();
            clearFormErrors();

            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;

            // 简单验证
            if (!account) {
                showFormError('loginAccount', '请输入用户名或手机号');
                return;
            }
            if (!password) {
                showFormError('loginPassword', '请输入密码');
                return;
            }

            console.log('尝试登录:', account);

            try {
                // 直接尝试登录，不先测试连接
                const formData = new FormData();
                formData.append('account', account);
                formData.append('password', password);

                const response = await fetch(`${API_BASE_URL}/login.php`, {
                    method: 'POST',
                    // 使用formdata，让浏览器自动设置头部
                    body: formData
                });

                console.log('登录响应状态:', response.status, response.statusText);

                // 即使状态码不是200，也尝试解析JSON
                let result;
                try {
                    const text = await response.text();
                    console.log('响应文本:', text);
                    result = JSON.parse(text);
                } catch (parseError) {
                    console.error('解析响应失败:', parseError);
                    throw new Error(`服务器返回了无效的JSON: ${response.status} ${response.statusText}`);
                }

                if (result.success) {
                    // 保存token和用户信息
                    currentToken = result.token;
                    currentUser = result.user;

                    // 1. 写入 Cookie（跨子域名共享）
                    setCookie('userToken', currentToken);

                    // 2. 写入 localStorage（本站使用 + Cookie 不可用时的备用）
                    localStorage.setItem('userToken', currentToken);
                    localStorage.setItem('userData', JSON.stringify(currentUser));

                    updateUserUI();
                    hideModal();
                    showMessage('登录成功！', 'success');
                    setTimeout(() => clearMessages(), 2000);
                } else {
                    showMessage(result.message || '登录失败');
                }
            } catch (error) {
                console.error('登录错误详情:', error);
                showMessage(`登录失败: ${error.message}`);
            }
        }

        // 处理注册
        async function handleRegister(e) {
            e.preventDefault();
            clearMessages();
            clearFormErrors();

            const username = document.getElementById('regUsername').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            // 验证
            if (username.length < 3 || username.length > 50) {
                showFormError('regUsername', '用户名长度应为3-50字符');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showFormError('regPhone', '手机号格式不正确');
                return;
            }
            if (password.length < 6) {
                showFormError('regPassword', '密码长度至少6位');
                return;
            }
            if (password !== confirmPassword) {
                showFormError('regConfirmPassword', '两次输入的密码不一致');
                return;
            }

            console.log('尝试注册:', username);

            try {
                const response = await fetch(`${API_BASE_URL}/register.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, phone, password })
                });

                console.log('注册响应状态:', response.status);
                const result = await response.json();
                console.log('注册响应数据:', result);

                if (result.success) {
                    showMessage('注册成功！请登录', 'success');
                    // 3秒后切换到登录表单
                    setTimeout(() => {
                        showModal('login');
                    }, 2000);
                } else {
                    showMessage(result.message || '注册失败');
                }
            } catch (error) {
                console.error('注册错误:', error);
                showMessage('网络错误，请稍后重试。错误详情：' + error.message);
            }
        }

        // 处理修改个人信息
        async function handleEditProfile(e) {
            e.preventDefault();
            clearMessages();
            clearFormErrors();

            if (!currentUser || !currentToken) {
                showMessage('请先登录');
                return;
            }

            const username = document.getElementById('editUsername').value.trim();
            const phone = document.getElementById('editPhone').value.trim();
            const password = document.getElementById('editPassword').value;

            // 验证
            if (username.length < 3 || username.length > 50) {
                showFormError('editUsername', '用户名长度应为3-50字符');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showFormError('editPhone', '手机号格式不正确');
                return;
            }
            if (!password) {
                showFormError('editPassword', '请输入当前密码验证');
                return;
            }

            console.log('尝试更新个人信息:', username);

            try {
                const response = await fetch(`${API_BASE_URL}/update.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        username: username,
                        phone: phone,
                        password: password
                    })
                });

                console.log('更新响应状态:', response.status);
                const result = await response.json();
                console.log('更新响应数据:', result);

                if (result.success) {
                    // 更新本地存储的用户信息和token
                    currentUser.username = result.user.username;
                    currentUser.phone = result.user.phone;
                    currentToken = result.token; // 更新token（因为用户名可能变了）

                    // 更新 Cookie（跨子域名）
                    setCookie('userToken', currentToken);

                    // 更新 localStorage
                    localStorage.setItem('userToken', currentToken);
                    localStorage.setItem('userData', JSON.stringify(currentUser));

                    updateUserUI();
                    hideModal();
                    showMessage('个人信息更新成功！', 'success');
                    setTimeout(() => clearMessages(), 2000);
                } else {
                    showMessage(result.message || '更新失败');
                }
            } catch (error) {
                console.error('更新错误:', error);
                showMessage('网络错误，请稍后重试。错误详情：' + error.message);
            }
        }

        // 处理修改密码
        async function handleChangePassword(e) {
            e.preventDefault();
            clearMessages();
            clearFormErrors();

            if (!currentUser || !currentToken) {
                showMessage('请先登录');
                return;
            }

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;

            // 验证
            if (!currentPassword) {
                showFormError('currentPassword', '请输入当前密码');
                return;
            }
            if (newPassword.length < 6) {
                showFormError('newPassword', '新密码长度至少6位');
                return;
            }
            if (newPassword !== confirmNewPassword) {
                showFormError('confirmNewPassword', '两次输入的新密码不一致');
                return;
            }

            console.log('尝试修改密码');

            try {
                const response = await fetch(`${API_BASE_URL}/change_password.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword,
                        confirm_password: confirmNewPassword
                    })
                });

                console.log('修改密码响应状态:', response.status);
                const result = await response.json();
                console.log('修改密码响应数据:', result);

                if (result.success) {
                    hideModal();
                    showMessage('密码修改成功！请重新登录', 'success');

                    // 密码修改后需要重新登录
                    setTimeout(() => {
                        logout();
                        showModal('login');
                    }, 2000);
                } else {
                    showMessage(result.message || '密码修改失败');
                }
            } catch (error) {
                console.error('修改密码错误:', error);
                showMessage('网络错误，请稍后重试。错误详情：' + error.message);
            }
        }

        // 退出登录
        function logout() {
            console.log('退出登录');
            currentUser = null;
            currentToken = null;

            // 清除 Cookie（跨子域名）
            deleteCookie('userToken');

            // 清除 localStorage
            localStorage.removeItem('userToken');
            localStorage.removeItem('userData');

            updateUserUI();
            if (userDropdown) userDropdown.classList.remove('active');
            showMessage('已退出登录', 'success');
            setTimeout(() => clearMessages(), 2000);
        }
    </script>
</body>

</html>
