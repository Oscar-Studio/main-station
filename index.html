<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar Studio - 专注于提升教学和学习质量</title>
    <style>
        :root {
            --primary-color: #4e54c8;
            --secondary-color: #8f94fb;
            --accent-color: #6c63ff;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --success-color: #28a745;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark-color);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0 20px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.2rem;
            color: #666;
            max-width: 700px;
            margin: 0 auto 20px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .tool-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .tool-icon {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 3rem;
        }

        .tool-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .tool-content h3 {
            margin-bottom: 10px;
            color: var(--dark-color);
        }

        .tool-content p {
            color: #666;
            margin-bottom: 15px;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            text-align: center;
        }

        .btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn-block {
            display: block;
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 20px 0;
            color: #666;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            margin-top: 30px;
        }

        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-color);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 1;
        }

        .status-new {
            background-color: var(--success-color);
        }

        .status-hot {
            background-color: #ff3b30;
        }

        .status-recommended {
            background-color: #ff9500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Oscar Studio</h1>
            <p>专注于提升教学和学习质量</p>
        </header>

        <main>
            <div class="tools-grid" id="tools-container">
                <div class="loading">正在加载工具...</div>
            </div>
        </main>

        <footer>
            <p>Oscar Studio &copy; 2025 - Designed by Oscar</p>
        </footer>
    </div>

    <script>
        // 从同文件夹下的config.json文件读取数据
        document.addEventListener('DOMContentLoaded', function () {
            fetch('config.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应不正常');
                    }
                    return response.json();
                })
                .then(data => {
                    displayTools(data.tools);
                })
                .catch(error => {
                    console.error('获取工具数据时出错:', error);
                    document.getElementById('tools-container').innerHTML =
                        '<div class="error">加载工具数据失败，请检查网络连接或配置文件。</div>';
                });
        });

        function displayTools(tools) {
            const container = document.getElementById('tools-container');

            if (!tools || tools.length === 0) {
                container.innerHTML = '<div class="error">没有找到工具数据。</div>';
                return;
            }

            let toolsHTML = '';

            tools.forEach(tool => {
                let statusHTML = '';
                if (tool.status && tool.status !== '无') {
                    // 将状态标签改为中文显示
                    let statusClass = 'featured-badge';
                    if (tool.status === '新') statusClass += ' status-new';
                    else if (tool.status === '热') statusClass += ' status-hot';
                    else if (tool.status === '推荐') statusClass += ' status-recommended';

                    statusHTML = `<span class="${statusClass}">${tool.status}</span>`;
                }

                toolsHTML += `
                    <div class="tool-card">
                        ${statusHTML}
                        <div class="tool-icon">
                            ${tool.icon || '🚀'}
                        </div>
                        <div class="tool-content">
                            <h3>${tool.name}</h3>
                            <p>${tool.description}</p>
                            <a href="${tool.domain}" target="_blank" class="btn btn-block">进入工具</a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = toolsHTML;
        }
    </script>
</body>

</html>
